services:
  trigram-algo:
    build:
      context: .
      dockerfile: Dockerfile
    image: trigram-algo:latest
    container_name: trigram-algo
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      TZ: Asia/Shanghai
      BUSINESS_TZ: Asia/Shanghai
    volumes:
      - trigram-data:/app/data
      - trigram-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - trigram-net

  nginx:
    image: nginx:1.25-alpine
    container_name: trigram-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_CONF:-./deploy/nginx/docker-http.conf}:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      trigram-algo:
        condition: service_healthy
    networks:
      - trigram-net

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    networks:
      - trigram-net
    entrypoint: /bin/true

volumes:
  trigram-data:
  trigram-logs:
  certbot-www:
  certbot-certs:

networks:
  trigram-net:
    driver: bridge
