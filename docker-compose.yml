services:
  trigram-algo:
    build:
      context: .
      dockerfile: Dockerfile
    image: trigram-algo:latest
    container_name: trigram-algo
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
    volumes:
      - trigram-data:/app/data
      - trigram-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/api/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  trigram-data:
  trigram-logs:
