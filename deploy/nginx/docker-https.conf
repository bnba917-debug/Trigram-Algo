# Docker 内 Nginx — HTTPS（申请证书后使用）
upstream trigram_app {
    server trigram-algo:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name aigo.toppeertalk.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name aigo.toppeertalk.com;

    ssl_certificate     /etc/letsencrypt/live/aigo.toppeertalk.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aigo.toppeertalk.com/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        proxy_pass http://trigram_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api/admin/ {
        proxy_pass http://trigram_app;
        proxy_read_timeout 120s;
    }
}
