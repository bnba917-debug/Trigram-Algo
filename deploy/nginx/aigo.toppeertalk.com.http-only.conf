# 首次部署 / 申请 SSL 证书前使用的纯 HTTP 配置
# 安装: sudo cp deploy/nginx/aigo.toppeertalk.com.http-only.conf /etc/nginx/sites-available/aigo.toppeertalk.com.conf
#       sudo ln -sf /etc/nginx/sites-available/aigo.toppeertalk.com.conf /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
# 证书申请完成后，替换为 aigo.toppeertalk.com.conf

upstream trigram_algo {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name aigo.toppeertalk.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        proxy_pass http://trigram_algo;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    access_log /var/log/nginx/aigo.toppeertalk.com.access.log;
    error_log  /var/log/nginx/aigo.toppeertalk.com.error.log warn;
}
