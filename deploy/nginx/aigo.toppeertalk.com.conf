# 刘伯温预测股市 — aigo.toppeertalk.com
# 安装: sudo cp deploy/nginx/aigo.toppeertalk.com.conf /etc/nginx/sites-available/
#       sudo ln -sf /etc/nginx/sites-available/aigo.toppeertalk.com.conf /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

upstream trigram_algo {
    server 127.0.0.1:3000;
    keepalive 16;
}

# HTTP → HTTPS 重定向（Certbot 申请证书前可暂时注释掉 return 301 行）
server {
    listen 80;
    listen [::]:80;
    server_name aigo.toppeertalk.com;

    # Certbot 验证路径（申请/续期证书时需要）
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aigo.toppeertalk.com;

    # Certbot 会自动写入以下 ssl 证书路径；首次部署前请注释本 server 块，先只用 HTTP 申请证书
    ssl_certificate     /etc/letsencrypt/live/aigo.toppeertalk.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aigo.toppeertalk.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 静态资源缓存（Express 也会提供静态文件，Nginx 可透传）
    client_max_body_size 2m;

    location / {
        proxy_pass http://trigram_algo;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # AI 生成接口可能较慢
        location /api/admin/ {
            proxy_pass http://trigram_algo;
            proxy_read_timeout 120s;
        }
    }

    access_log /var/log/nginx/aigo.toppeertalk.com.access.log;
    error_log  /var/log/nginx/aigo.toppeertalk.com.error.log warn;
}
